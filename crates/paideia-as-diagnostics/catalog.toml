[diagnostic.M0313]
severity = "error"
category = "module"
title = "File contains no top-level module"
brief = "a .pdx file must contain exactly one top-level structure or functor"
description = "Per §7.6, each .pdx source file declares exactly one module (structure or functor). Found none."
since = "0.1.0"
deprecated = false

[diagnostic.B1700]
severity = "error"
category = "binary"
title = "Undefined symbol"
brief = "undefined symbol — no exporting PAX provides it"
description = "A symbol is marked as undefined (section_index=0xFFFFFFFF) in the symbol table, but no input PAX exports a symbol with the same BLAKE3 name hash. The linker cannot resolve this reference."
since = "0.1.0"
deprecated = false

[diagnostic.B1701]
severity = "error"
category = "binary"
title = "Unbound capability"
brief = "unbound capability — no export matches an import"
description = "An ImportsSection entry requests a capability (by BLAKE3 name hash), but no PAX's ExportsSection provides a capability with that hash. The linker cannot bind this required capability."
since = "0.1.0"
deprecated = false

[diagnostic.P0190]
severity = "error"
category = "parser"
title = "Malformed functor application"
brief = "malformed functor application: expected `(` or missing close paren"
description = "A functor application expression `F(M)` is syntactically incomplete: either the opening `(` is missing after the functor name, or the argument list is not closed with `)`. Check that every module argument is wrapped in matching parentheses."
since = "0.1.0"
deprecated = false

[diagnostic.P0191]
severity = "error"
category = "parser"
title = "Malformed sharing constraint"
brief = "malformed sharing constraint: expected `=` between paths"
description = "A sharing constraint in a functor application `sharing (A::t = B::t)` is malformed: the `=` separator between the two module paths is missing or the paths themselves are incomplete."
since = "0.1.0"
deprecated = false

[diagnostic.P0192]
severity = "error"
category = "parser"
title = "Malformed pack expression"
brief = "malformed pack expression: expected `:` or signature"
description = "A pack expression `pack M : S` is syntactically incomplete: either the `:` separator is missing or the signature path is absent. Check that the pack syntax is `pack <module> : <signature>`."
since = "0.1.0"
deprecated = false

[diagnostic.P0193]
severity = "error"
category = "parser"
title = "Malformed unpack expression"
brief = "malformed unpack expression: missing operand"
description = "An unpack expression `unpack v` is missing its operand. Provide an expression that evaluates to a packed module value."
since = "0.1.0"
deprecated = false

[diagnostic.P0194]
severity = "error"
category = "parser"
title = "Malformed let-module binding"
brief = "malformed let-module binding: missing `=`, `unpack`, or `in`"
description = "A let-module binding `let module N = unpack v in <expr>` is syntactically incomplete: either `=` after the binding name, the `unpack` keyword, or `in` before the continuation is missing. Check the syntax: `let module <name> = unpack <value> in <expr>`."
since = "0.1.0"
deprecated = false

[diagnostic.P0195]
severity = "error"
category = "parser"
title = "Malformed pointer type"
brief = "malformed pointer type: expected a type after `*`"
description = "A pointer type `*T` is syntactically incomplete: a type is required after the `*` prefix. Check that a valid type follows the `*` token."
since = "0.1.0"
deprecated = false

[diagnostic.P0196]
severity = "error"
category = "parser"
title = "Malformed reference type"
brief = "malformed reference type: expected a type after `&`"
description = "A reference type `&T` is syntactically incomplete: a type is required after the `&` prefix. Check that a valid type follows the `&` token."
since = "0.1.0"
deprecated = false

[diagnostic.P0197]
severity = "error"
category = "parser"
title = "Malformed record type or constructor"
brief = "malformed record: expected field name, colon, type/value, or closing brace"
description = "A record type or constructor expression is syntactically incomplete. Ensure all fields follow the pattern `name: type` (in types) or `name: expr` (in constructors), separated by commas, with proper opening and closing braces."
since = "0.1.0"
deprecated = false

[diagnostic.P0198]
severity = "error"
category = "parser"
title = "Malformed enum type"
brief = "malformed enum: expected variant name, payload, or closing brace"
description = "An enum type definition is syntactically incomplete. Ensure all variants follow one of these patterns: `Name` (unit), `Name(Type1, Type2)` (tuple), or `Name { field1: Type1 }` (record), separated by commas, with proper opening and closing braces."
since = "0.1.0"
deprecated = false

[diagnostic.P0199]
severity = "error"
category = "parser"
title = "Refutable pattern in let binding"
brief = "this pattern may not match all values of the scrutinee's type; use match instead"
description = "A let binding uses a refutable pattern (such as an enum variant or literal) that may not match all possible values of the value expression's type. Refutable patterns are only legal in match arms. Either use a wildcard or identifier pattern in the let binding, or use a match expression instead."
since = "0.4.0"
deprecated = false

[diagnostic.P0101]
severity = "error"
category = "parser"
title = "Empty statement found"
brief = "expected statement, found empty statement (`;`)"
description = "Phase 6 m2-002: a statement block (such as `unsafe { block: { ... } }`) encountered consecutive semicolons or a leading semicolon, forming an empty statement. Empty statements are not allowed. Provide a valid statement (expression, let binding, return, instruction, etc.) or remove the extra semicolons. Trailing semicolons after valid statements are permitted (e.g., `{ stmt1; stmt2; }`)."
since = "0.9.0"
deprecated = false

[diagnostic.P0201]
severity = "error"
category = "parser"
title = "Malformed trait declaration"
brief = "expected trait name followed by optional generic parameters and a body"
description = "A trait declaration must have the form: trait Name<T, U, ...> { method_sig; ... }. The trait keyword must be followed by an identifier, optionally followed by generic parameters enclosed in angle brackets, and a body enclosed in braces containing method signatures."
since = "0.7.0"
deprecated = false

[diagnostic.P0202]
severity = "error"
category = "parser"
title = "Malformed impl block"
brief = "expected impl block syntax"
description = "An impl block must have the form: impl<T, U, ...> (TraitName)? for Type { items }. The impl keyword must be followed by optional generic parameters, optionally a trait name and 'for' keyword, a type, and a body enclosed in braces."
since = "0.7.0"
deprecated = false

[diagnostic.P0210]
severity = "error"
category = "parser"
title = "Empty array literal requires type annotation"
brief = "empty array literal `[]` used without explicit type"
description = "Phase 5 m4-002: array literal expressions with explicit syntax `[expr, expr, ...]` require a type annotation to disambiguate the element type when the array is empty. Provide an explicit type annotation like `let xs: [u64; 3] = [1, 2, 3];` or ensure the array is not empty so the type can be inferred from elements."
since = "0.8.0"
deprecated = false

[diagnostic.P0220]
severity = "error"
category = "parser"
title = "uninit only valid for let mut"
brief = "uninit marker not allowed in immutable let binding"
description = "Phase 6 m5-001: The uninit keyword can only be used as the right-hand side of a mutable let binding (let mut). To fix this, either add the mut keyword to the let binding or provide a proper initialization value. Example: `let mut x: u64 = uninit;` is valid, but `let x: u64 = uninit;` is not."
since = "0.9.0"
deprecated = false

[diagnostic.P0221]
severity = "error"
category = "parser"
title = "uninit not valid in this position"
brief = "uninit keyword only valid as RHS of let mut binding"
description = "Phase 6 m5-001: The uninit keyword can only be used as the right-hand side of a mutable let binding. It cannot appear as a general expression in function calls, return statements, or other contexts. Use it only in patterns like `let mut x: Type = uninit;`."
since = "0.9.0"
deprecated = false

[diagnostic.O1500]
severity = "note"
category = "optimization"
title = "Peephole rewrite applied"
brief = "a peephole rewrite fired on the function"
description = "Per optimization-passes.md §1.2, peephole rewrites improve generated code quality. O1500 informs the user when a rewrite fired."
since = "0.1.0"
deprecated = false

[diagnostic.O1501]
severity = "note"
category = "optimization"
title = "Reserved for future peephole sub-pass"
brief = "reserved diagnostic slot"
description = "Reserved for a future per-rewrite peephole diagnostic (currently O1500 covers the whole pass)."
since = "0.1.0"
deprecated = false

[diagnostic.O1502]
severity = "note"
category = "optimization"
title = "Reserved for future peephole sub-pass"
brief = "reserved diagnostic slot"
description = "Reserved for a future per-rewrite peephole diagnostic."
since = "0.1.0"
deprecated = false

[diagnostic.O1503]
severity = "note"
category = "optimization"
title = "Instruction scheduling applied"
brief = "instruction scheduling reordered independent instructions to hide latency"
description = "Per optimization-passes.md §2, instruction scheduling exploits ILP within basic blocks by hoisting higher-latency operations earlier."
since = "0.1.0"
deprecated = false

[diagnostic.O1504]
severity = "note"
category = "optimization"
title = "Macro-fusion alignment applied"
brief = "CMP+Jcc pair aligned within a 16-byte fetch window for macro fusion"
description = "Per optimization-passes.md §4, modern x86_64 CPUs fuse CMP+Jcc (or TEST+Jcc) pairs into a single µop, but only when both fit within one 16-byte fetch window. This pass aligns such pairs by inserting NOPs as needed."
since = "0.1.0"
deprecated = false

[diagnostic.O1505]
severity = "note"
category = "optimization"
title = "Dead-store elimination applied"
brief = "stores to memory subsequently overwritten without intervening reads were removed"
description = "Per optimization-passes.md §5, basic-block-local dead-store elimination removes stores whose effects are immediately overwritten."
since = "0.1.0"
deprecated = false

[diagnostic.O1506]
severity = "note"
category = "optimization"
title = "REX/EVEX prefix tightening applied"
brief = "instruction shortened to its smallest legal encoding"
description = "Per optimization-passes.md §6, picking the shortest legal encoding (32-bit ADD short form, Jcc rel8 over rel32) reduces code size and improves L1i density."
since = "0.1.0"
deprecated = false

[diagnostic.O1507]
severity = "note"
category = "optimization"
title = "Branch-hint code layout applied"
brief = "unlikely branches moved off fall-through for better code density"
description = "Per optimization-passes.md §7, branch hints direct the code layout pass to place unlikely branches away from the fall-through path, improving cache density and reducing misprediction penalties."
since = "0.1.0"
deprecated = false

[diagnostic.O1508]
severity = "note"
category = "optimization"
title = "Function-entry alignment applied"
brief = "function entry aligned to improve L1i cache performance"
description = "Per optimization-passes.md §8, aligning function entries to cache-line boundaries (typically 64 bytes) reduces L1i cache conflicts and improves prefetching efficiency."
since = "0.1.0"
deprecated = false

[diagnostic.O1509]
severity = "note"
category = "optimization"
title = "Constant-pool emission applied"
brief = "repeated 64-bit immediates factored into a constant pool"
description = "Per optimization-passes.md §9, constants appearing multiple times in a function are factored into a read-only constant pool, reducing instruction encoding size and improving cache density."
since = "0.1.0"
deprecated = false

[diagnostic.O1510]
severity = "note"
category = "optimization"
title = "Tail-call eliminated"
brief = "final call + ret sequence rewritten as a jmp"
description = "Per OS-requirements §6 design-clarification 5: TCO ships in Phase 2 to support the kernel's exception-unwinder path. Capability boundaries, effect-handler installations, and ABI mismatches suppress TCO."
since = "0.1.0"
deprecated = false

[diagnostic.O1511]
severity = "note"
category = "optimization"
title = "Loop unrolling applied"
brief = "loop unrolled by explicit factor"
description = "Per optimization-passes.md §10, loop unrolling replicates loop body by a compile-time constant factor to reduce branch penalties and improve ILP. Phase-2-m9-009 supports only known trip counts with divisible factors; remainder loops are deferred to phase-2-m9-010."
since = "0.1.0"
deprecated = false

[diagnostic.O1512]
severity = "warning"
category = "optimization"
title = "Loop unrolling requested on unknown trip count"
brief = "unroll directive ignored due to symbolic or unknown iteration count"
description = "Loop unrolling with #[unroll(n)] requires a known trip count divisible by n. This loop's trip count is symbolic or unknown, preventing safe unrolling. Remainder-loop dispatch to handle unknown trip counts is deferred to phase-2-m9-010. Provide a constant trip count or remove the #[unroll(n)] directive."
since = "0.1.0"
deprecated = false

[diagnostic.Q0901]
severity = "error"
category = "post-quantum"
title = "Signing-key scope insufficient"
brief = "the signing key's scope does not subsume the artifact's effect set"
description = "Per OS-requirements §4 N1, a signing key is authorized for a specific set of effects (its scope). When signing a PAX, the PAX's effect set (from .paideia.effects section) must be a subset of the key's authorized scope. This error indicates a scope mismatch: the key cannot sign this artifact because it lacks authorization for some required effects. Check the key's scope and the artifact's effect declarations."
since = "0.1.0"
deprecated = false

[diagnostic.Q0902]
severity = "warning"
category = "post-quantum"
title = "HSM does not support post-quantum signing"
brief = "the configured HSM (YubiHSM2 ≤ firmware 2.6) supports Ed25519 in hardware but not ML-DSA-65; the PQ leg falls back to soft-HSM"
description = "Phase 3 m6-002 documents this as the canonical hybrid-fallback shape. Operator opt-in is required via --opt-in-hybrid-fallback. See design/security/pq-trust-root.md (phase-3 appendix m6-005)."
since = "0.3.0"
deprecated = false

[diagnostic.T0511]
severity = "warning"
category = "type"
title = "Borrowed-reference type not yet supported"
brief = "&T / &mut T are reserved for a future region-calculus extension"
description = "Phase 3 ships raw pointers (*T) only. Borrowed references &T / &mut T are reserved for a future phase that requires a region calculus + borrow-checker pass; see design/toolchain/phase-3-plan.md §15 open question."
since = "0.1.0"
deprecated = false

[diagnostic.S0900]
severity = "error"
category = "substructural"
title = "Linear or Ordered binding never used"
brief = "binding is never used (requires exactly one use)"
description = "A binding declared as Linear or Ordered in the substructural lattice must be used exactly once. This binding was never used. A Linear binding represents a unique resource that must be consumed; Ordered adds ordering constraints. Check that the binding is referenced exactly once in its scope."
since = "0.3.0"
deprecated = false

[diagnostic.S0901]
severity = "error"
category = "substructural"
title = "Linear or Ordered binding overused"
brief = "binding used more than once (requires exactly one use)"
description = "A binding declared as Linear or Ordered must be used exactly once. This binding was used multiple times. Linear bindings represent unique resources; Affine bindings may be used at most once; Unrestricted have no constraints."
since = "0.3.0"
deprecated = false

[diagnostic.S0902]
severity = "error"
category = "substructural"
title = "Linear binding leaked via let shadowing"
brief = "linear binding shadowed by let without consumption"
description = "A linear binding from an outer scope is shadowed by a new let binding with the same name before the outer binding has been consumed (used exactly once). This creates a resource leak: the outer linear binding is no longer accessible within the inner scope and cannot be consumed. Move the outer binding's use before the shadowing let, or use a different name for the inner binding."
since = "0.3.0"
deprecated = false

[diagnostic.S0904]
severity = "error"
category = "substructural"
title = "Affine binding consumed in multiple match arms"
brief = "affine binding may be consumed across sibling branches"
description = "An affine binding may be used at most once, but the analysis detects that it could be consumed in two or more sibling match arms (or if/then/else branches). Although only one branch executes dynamically, the static analysis tracks 'may consume' (not 'must consume'), so this is flagged as a static error. Restructure the code so the affine binding is used in only one branch, or assign it to an unrestricted binding first."
since = "0.3.0"
deprecated = false

[diagnostic.S0905]
severity = "error"
category = "substructural"
title = "Ordered binding used out of order within handler"
brief = "ordered resource used out of order across handler"
description = "An ordered binding declared in an enclosing scope is used out of declaration order within a handler body. Handler installations impose strict sequential-use constraints on ordered bindings: all uses must respect their declaration order. Reorder the uses in the handler body to match the order in which the bindings were declared."
since = "0.3.0"
deprecated = false

[diagnostic.S0906]
severity = "error"
category = "substructural"
title = "Cannot borrow as mutable while also borrowed as immutable"
brief = "a mutable borrow conflicts with an active immutable borrow"
description = "Phase 4 m6-001: the borrow checker requires that a binding can be borrowed either as immutable (any number of times) or as mutable (exactly once), but not both simultaneously. This rule prevents data races and use-after-free patterns."
since = "0.4.0"
deprecated = false

[diagnostic.S0907]
severity = "error"
category = "substructural"
title = "Cannot borrow as mutable more than once"
brief = "a mutable borrow conflicts with another active mutable borrow"
description = "Phase 4 m6-001: a binding can have at most one active mutable borrow at a time. This prevents data races by guaranteeing exclusive access through the mutable reference."
since = "0.4.0"
deprecated = false

[diagnostic.S0908]
severity = "error"
category = "substructural"
title = "Borrowed value does not live long enough"
brief = "the source binding's lifetime is shorter than the borrow's lifetime"
description = "Phase 4 m6-002: the borrow checker requires that any borrowed value lives at least as long as the borrow. If the source goes out of scope before the borrow does, fire S0908."
since = "0.4.0"
deprecated = false

[diagnostic.S0909]
severity = "error"
category = "substructural"
title = "Cannot assign to value while borrowed"
brief = "the binding is currently borrowed; assignment is forbidden until all borrows expire"
description = "Phase 4 m6-003: prevents mutation-through-borrow races. While a borrow is active, the source binding may not be assigned a new value."
since = "0.4.0"
deprecated = false

[diagnostic.T0512]
severity = "error"
category = "type"
title = "Non-exhaustive match"
brief = "match arms do not cover every variant of the scrutinee's type"
description = "Phase 4 m7-006: match expressions on enum types must cover every variant. Either add the missing variant arms or use a wildcard pattern `_` to catch the remainder. Diagnostic code lands in the type-system pattern region (0500-0899) — the issue spec's M0900 was out of M's reserved range (0300-0499); T0512 follows m1-003's T0511 reservation for the future borrowed-reference codepath."
since = "0.4.0"
deprecated = false

[diagnostic.T0513]
severity = "error"
category = "type"
title = "Duplicate impl for trait-type pair"
brief = "an impl block for the same (trait, type) pair already exists"
description = "Phase 4 m9-004: impl coherence check. Each (trait, type) pair may have at most one impl block. Remove the duplicate impl or distinguish the type to avoid the conflict."
since = "0.7.0"
deprecated = false

[diagnostic.T0514]
severity = "error"
category = "type"
title = "Unsatisfied trait bound"
brief = "no impl found for trait X on type Y at this call site"
description = "Phase 4 m9-005: trait-bound resolution. At this call site, a method requires its type argument to implement a specific trait, but neither a generic-parameter bound nor a concrete impl satisfies this requirement. Either bind the type parameter to the required trait in the enclosing generic-parameter list, or provide a concrete impl for the type."
since = "0.7.0"
deprecated = false

[diagnostic.T0515]
severity = "error"
category = "type"
title = "Unsupported record field type in Phase 6 layout computation"
brief = "field type is not in {u64, u32, u8, *T} supported by Phase-6 layout finaliser"
description = "Phase 6 m3-001: record field layout computation supports u64 (8 bytes, align 8), u32 (4 bytes, align 4), u8 (1 byte, align 1), and pointer types *T (8 bytes, align 8). Records with fields outside this set cannot be finalised. Add support for additional field types in a future phase or refactor the record to use only the supported types."
since = "0.6.0"
deprecated = false

[diagnostic.T0516]
severity = "error"
category = "type"
title = "Field access only supports Deref(Var(arg0)) shape"
brief = "(*p).field pattern required; nested dereferences or non-argument patterns not yet supported"
description = "Phase 6 m3-002: EmitWalker field access lowering currently supports only the shape (*p).field where p is the function's first argument. Other patterns, such as nested dereferences (**p), non-argument pointers (local p), or more complex expressions, are not yet supported. Restructure your code to use field access on a dereferenced first argument, or defer support to a later phase."
since = "0.6.0"
deprecated = false

[diagnostic.T0517]
severity = "error"
category = "type"
title = "Register pressure exceeded in Phase 6 field-bind"
brief = "more than 4 in-flight field bindings in a single function"
description = "Phase 6 m3-003: EmitWalker field-binding lowering assigns scratch registers in sequence: RAX(0), RCX(1), RDX(2), R8(8). The calling convention provides exactly 4 caller-save scratch registers. When more than 4 field bindings appear in a single function scope, the elaborator cannot assign a scratch register. Restructure your function to use fewer than 5 field bindings, or defer the assignment of later bindings to a later phase."
since = "0.6.0"
deprecated = false

[diagnostic.T0518]
severity = "error"
category = "type"
title = "RecordCons must be bound by construct_into(...) in Phase 6"
brief = "unsupported RecordCons shape in Phase 6 m3-004"
description = "Phase 6 m3-004: EmitWalker RecordCons lowering currently supports only the cap-mint (4-field all-u64) shape when bound via let p : *T = construct_into(...). Other record shapes and binding patterns are not yet supported. Restructure your code to use the supported shape, or defer support to a later phase."
since = "0.6.0"
deprecated = false

[diagnostic.T0519]
severity = "error"
category = "type"
title = "If-expression branches have mismatched types"
brief = "then and else branches of if-expression have incompatible types"
description = "Phase 7 m1-001: both branches of an if-then-else expression must have the same type. The then branch has type T1 but the else branch has type T2. If you meant to discard the result, wrap in an action block { ... }; if you meant to use one branch's type, add an explicit type annotation or restructure the expression."
since = "0.7.0"
deprecated = false

[diagnostic.T0520]
severity = "error"
category = "type"
title = "Loop body type-incompatible with break value"
brief = "break value type does not match loop result type"
description = "Phase 7 m1-002 (PA7-004): when a break statement in a while loop provides a value, that value's type must match the expected result type of the loop expression. If the loop is used in a context requiring a specific return type, all break values must have that type. If you meant to discard the result, ensure all breaks are value-less or restructure the code to return unit type."
since = "0.7.0"
deprecated = false

[diagnostic.L2001]
severity = "warning"
category = "lint"
title = "Ambiguous lifetime elision"
brief = "elision rules cannot determine output lifetime from input lifetimes"
description = "Phase 4 m5-005: region (lifetime) elision. When a function's output borrow lacks an explicit lifetime, the elision rules attempt to infer it from input lifetimes: (1) if a single input borrow has an elided lifetime, use it; (2) if a single input lifetime exists (explicit or elided), assign it to all elided outputs; (3) for methods, all output lifetimes take the receiver's lifetime. This warning fires when the rules encounter an ambiguous situation: either multiple input lifetimes (ambiguous which to choose) or zero input lifetimes but an elided output (nothing to infer from). Resolve by explicitly annotating the output lifetime with the desired region."
since = "0.7.0"
deprecated = false

[diagnostic.U1605]
severity = "error"
category = "unsafe"
title = "Unknown mnemonic in unsafe block"
brief = "the mnemonic name is not in the resolver table; check spelling or file an issue if the instruction should be supported"
description = "Phase 5 m3-003: every mnemonic used inside an `unsafe { block: { ... } }` must be present in the MNEMONIC_TABLE. Unknown mnemonics could be typos OR could be valid x86_64 instructions not yet wired through paideia-as. The resolver tables cover Phase 3 m2-001's 10 base mnemonics plus Phase 5 m2-001's 20 privileged/system-ISA mnemonics, along with all Jcc condition codes, control/debug register moves, I/O port operations, and software interrupts (30+ total). Consult `crates/paideia-as-elaborator/src/unsafe_walker.rs` MNEMONIC_TABLE or file an issue to request additional instruction support."
since = "0.5.0"
deprecated = false

[diagnostic.U1606]
severity = "error"
category = "unsafe"
title = "Malformed operand in unsafe block"
brief = "operand parsing failed; check operand syntax and memory-addressing mode"
description = "Phase 5 m3-004: UnsafeWalker encountered an operand parsing error while elaborating a StmtInstruction inside an `unsafe { block: { ... } }`. This indicates a syntax error in the operand expression: invalid register name, malformed memory reference (e.g., '[rdi +]' with missing operand), type mismatch, or other shape error returned by m3-002's operand parser. The instruction is skipped; check the operand against the x86_64 addressing-mode rules in design/cpu/unsafe-blocks.md."
since = "0.5.0"
deprecated = false

[diagnostic.U1607]
severity = "error"
category = "unsafe"
title = "Unexpected operands for zero-arity instruction"
brief = "the instruction takes no operands; operands present in source are ignored"
description = "Phase 6 m1-005: cli, sti, hlt, nop, swapgs, cpuid, wrmsr, rdmsr, iret, iretq, sysret, rep_stosq take no operands. Source with operands for these mnemonics emits U1607 and proceeds with operands ignored (recovery posture for iteration)."
since = "0.6.0"
deprecated = false

[diagnostic.U1608]
severity = "error"
category = "unsafe"
title = "Field offset not resolved in unsafe block"
brief = "field offset cannot be resolved; declare struct before use"
description = "Phase 6 m3-005: A field access expression (*p.field) inside an unsafe { block: { ... } } references a field whose struct type has not been registered in the record layout table. This occurs when the target record type is not declared before the unsafe block, or the field name does not exist in the struct. The unsafe block requires C-ABI natural-alignment record layout information to resolve field byte offsets at parse time."
since = "0.6.0"
deprecated = false

[diagnostic.U1609]
severity = "error"
category = "unsafe"
title = "Duplicate label declaration in unsafe block"
brief = "label name already declared; each label must be unique within the unsafe block"
description = "Phase 6 m4-002: A label with this name has already been declared in the current unsafe block. Labels must have unique names within the block's scope. Rename the duplicate label to a unique identifier or remove the duplicate declaration."
since = "0.9.0"
deprecated = false

[diagnostic.U1610]
severity = "error"
category = "unsafe"
title = "Unknown label reference in unsafe block"
brief = "label referenced but not declared; check spelling or add label declaration"
description = "Phase 6 m4-002: A jump instruction references a label that has not been declared in the current unsafe block. Either declare the label with a `label_name:` statement, or fix the spelling of the label reference. Label resolution is performed at parse time by the walker."
since = "0.9.0"
deprecated = false

[diagnostic.U1611]
severity = "error"
category = "unsafe"
title = "SymbolRef operand not supported for mnemonic in Phase 6"
brief = "bare-identifier symbol in call position is valid only for call/jmp mnemonics"
description = "Phase 6 m4-005: A bare-identifier symbol operand (e.g., `cap_alloc`) was used with a mnemonic that does not support symbol references. In Phase 6, only `call` and `jmp` (both conditional and unconditional) mnemonics support bare-identifier symbols in call position, which resolve to SymbolRef operands with PC-relative 32-bit relocations. Other mnemonics (mov, lea, etc.) require explicit syntax (e.g., `lea rax, [symbol]` for RIP-relative addressing). This restriction will be lifted in Phase 7+ with full symbol-address-of support. Either use call/jmp, or refactor to use supported addressing modes."
since = "0.10.0"
deprecated = false
