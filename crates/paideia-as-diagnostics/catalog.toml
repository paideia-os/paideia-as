[diagnostic.M0306]
severity = "error"
category = "module"
title = "Multiple top-level modules in file"
brief = "a .pdx file must contain exactly one top-level structure or functor"
description = "Per §7.6, each .pdx source file declares exactly one module. Found more than one."
