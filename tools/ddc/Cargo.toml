[package]
name = "ddc"
version = "0.0.1"
edition.workspace = true
publish = false

[lib]
path = "src/lib.rs"

[[bin]]
name = "ddc-diff"
path = "src/bin/ddc-diff.rs"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = "1"
toml = "0.8"

[dev-dependencies]
tempfile = { workspace = true }
