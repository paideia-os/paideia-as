[catalog]
version = "0.1.0"
last_updated = "2026-06-18"

[diagnostic.E0001]
severity = "error"
category = "lexer"
title = "Source file is not valid UTF-8"
brief = "encoding error (not UTF-8)"
description = "PaideiaOS source files must be UTF-8 encoded. The file's bytes do not form valid UTF-8 at the position indicated."
since = "0.1.0"
deprecated = false

[diagnostic.E0002]
severity = "error"
category = "lexer"
title = "Line ending error: lone CR found"
brief = "line-ending error (lone CR)"
description = "Source files must use LF (Unix) or CRLF (Windows) line endings. Lone CR characters are not permitted."
since = "0.1.0"
deprecated = false

[diagnostic.E0003]
severity = "error"
category = "lexer"
title = "Invisible character forbidden"
brief = "invisible character forbidden (ZWSP, etc.)"
description = "Zero-width spaces and other invisible Unicode characters are not permitted in source code as they can introduce subtle bugs."
since = "0.1.0"
deprecated = false

[diagnostic.E0004]
severity = "error"
category = "lexer"
title = "Unterminated string literal"
brief = "unterminated string literal"
description = "A string literal was opened but not closed before end of line or end of file."
since = "0.1.0"
deprecated = false

[diagnostic.E0005]
severity = "error"
category = "lexer"
title = "Unterminated block comment"
brief = "unterminated block comment"
description = "A block comment (/* ... */) was opened but never closed."
since = "0.1.0"
deprecated = false

[diagnostic.E0006]
severity = "error"
category = "lexer"
title = "Invalid number literal"
brief = "invalid number literal (bad digits, out of range)"
description = "A numeric literal contains invalid digits for its radix, or the resulting value exceeds the target type's range."
since = "0.1.0"
deprecated = false

[diagnostic.E0007]
severity = "error"
category = "lexer"
title = "Invalid character literal"
brief = "invalid character literal (more than one codepoint, bad escape)"
description = "A character literal must contain exactly one Unicode codepoint and use valid escape sequences."
since = "0.1.0"
deprecated = false

[diagnostic.E0008]
severity = "error"
category = "lexer"
title = "Invalid escape in string literal"
brief = "invalid escape in string literal"
description = "A string literal contains an invalid or malformed escape sequence."
since = "0.1.0"
deprecated = false

[diagnostic.E0009]
severity = "error"
category = "lexer"
title = "Invalid raw-string delimiter"
brief = "invalid raw-string delimiter"
description = "Raw string delimiters must follow the correct syntax (e.g., r#\"...\"# with matching hash counts)."
since = "0.1.0"
deprecated = false

[diagnostic.E0010]
severity = "error"
category = "lexer"
title = "Unicode operator used in ASCII-only mode"
brief = "unicode operator used in ASCII-only mode"
description = "Unicode operators are not permitted when the file or context is restricted to ASCII-only identifiers and operators."
since = "0.1.0"
deprecated = false

[diagnostic.E0011]
severity = "error"
category = "lexer"
title = "Reserved word used as identifier"
brief = "reserved-word used as identifier"
description = "A language keyword or reserved word cannot be used as an identifier without quoting."
since = "0.1.0"
deprecated = false

[diagnostic.E0012]
severity = "error"
category = "lexer"
title = "Identifier starts with invalid character"
brief = "identifier starts with a digit or other invalid character"
description = "Identifiers must start with a letter or underscore, not a digit or other symbol."
since = "0.1.0"
deprecated = false

[diagnostic.E0013]
severity = "error"
category = "lexer"
title = "Maximum file size exceeded"
brief = "maximum file size exceeded"
description = "The source file exceeds the maximum permitted size (typically to prevent resource exhaustion)."
since = "0.1.0"
deprecated = false

[diagnostic.E0014]
severity = "error"
category = "lexer"
title = "Maximum nesting depth exceeded"
brief = "maximum nesting depth exceeded"
description = "Parentheses, brackets, braces, or comment nesting reaches the maximum permitted depth."
since = "0.1.0"
deprecated = false

[diagnostic.E0015]
severity = "error"
category = "lexer"
title = "Invalid byte literal"
brief = "invalid byte literal (out of 0..255)"
description = "A byte literal must represent a value in the range 0 to 255."
since = "0.1.0"
deprecated = false

[diagnostic.E0016]
severity = "error"
category = "lexer"
title = "Invalid Unicode escape"
brief = "invalid Unicode escape (out of 0..0x10FFFF)"
description = "A Unicode escape sequence specifies a codepoint outside the valid Unicode range (0 to 0x10FFFF)."
since = "0.1.0"
deprecated = false

[diagnostic.E0017]
severity = "error"
category = "lexer"
title = "Surrogate codepoint in Unicode escape"
brief = "surrogate codepoint in Unicode escape"
description = "Unicode surrogate codepoints (U+D800 to U+DFFF) cannot appear in escape sequences or identifiers."
since = "0.1.0"
deprecated = false

[diagnostic.E0018]
severity = "error"
category = "lexer"
title = "Source file is empty or whitespace-only"
brief = "source file empty or whitespace-only"
description = "A source file must contain at least one meaningful token (not just whitespace or comments)."
since = "0.1.0"
deprecated = false

[diagnostic.M0301]
severity = "error"
category = "module"
title = "Structure missing signature declaration"
brief = "structure does not provide a declaration required by the signature"
description = "Signature ascription requires the structure to define a named type/val/module that is absent."
since = "0.1.0"
deprecated = false

[diagnostic.M0302]
severity = "error"
category = "module"
title = "Structure binding kind mismatches signature"
brief = "structure binding kind or type does not match signature declaration"
description = "A name is bound in both the signature and the structure but with incompatible kinds (type/val/module) or types."
since = "0.1.0"
deprecated = false

[diagnostic.M0303]
severity = "error"
category = "module"
title = "Sharing constraint violated"
brief = "functor sharing constraint requires equal types but paths disagree"
description = "A sharing constraint asserted equality between two type paths, but the resolved types differ (or one path is unresolved). See the diagnostic message for the resolved types and a 'did you mean' suggestion when paths are close."
since = "0.1.0"
deprecated = false

[diagnostic.M0304]
severity = "error"
category = "module"
title = "Unpack expects a packed value"
brief = "`unpack` operand is not a packed module value"
description = "The `unpack` form opens a packed module value (produced by `pack`). The operand here was a regular structure, not a packed value."
since = "0.1.0"
deprecated = false

[diagnostic.M0305]
severity = "error"
category = "module"
title = "Module name does not match file basename"
brief = "the top-level module's name must match the file basename in PascalCase"
description = "Per §7.6, each .pdx file declares exactly one top-level structure or functor whose name matches the file basename converted to PascalCase (e.g., my_thing.pdx → MyThing)."
since = "0.1.0"
deprecated = false

[diagnostic.M0306]
severity = "error"
category = "module"
title = "Multiple top-level modules in file"
brief = "a .pdx file must contain exactly one top-level structure or functor"
description = "Per §7.6, each .pdx source file declares exactly one module. Found more than one."
since = "0.1.0"
deprecated = false

[diagnostic.M0307]
severity = "error"
category = "module"
title = "Macro feature not implemented in phase 1"
brief = "macro feature deferred to phase 2"
description = "Phase-1 placeholder for reflective macro features (typed elaborator reflection, quote/antiquote, splice, elab, hygiene under reflection). Retired in Phase 2 m2 (PRs #361–#371) — the full Lean-4-style reflection track is now live so this code should never fire. Reserved for compatibility; will be deleted in Phase 3."
since = "0.1.0"
deprecated = true

[diagnostic.M0313]
severity = "error"
category = "module"
title = "File contains no top-level module"
brief = "a .pdx file must contain exactly one top-level structure or functor"
description = "Per §7.6, each .pdx source file declares exactly one module (structure or functor). Found none."
since = "0.1.0"
deprecated = false

[diagnostic.B1700]
severity = "error"
category = "binary"
title = "Undefined symbol"
brief = "undefined symbol — no exporting PAX provides it"
description = "A symbol is marked as undefined (section_index=0xFFFFFFFF) in the symbol table, but no input PAX exports a symbol with the same BLAKE3 name hash. The linker cannot resolve this reference."
since = "0.1.0"
deprecated = false

[diagnostic.B1701]
severity = "error"
category = "binary"
title = "Unbound capability"
brief = "unbound capability — no export matches an import"
description = "An ImportsSection entry requests a capability (by BLAKE3 name hash), but no PAX's ExportsSection provides a capability with that hash. The linker cannot bind this required capability."
since = "0.1.0"
deprecated = false

[diagnostic.P0190]
severity = "error"
category = "parser"
title = "Malformed functor application"
brief = "malformed functor application: expected `(` or missing close paren"
description = "A functor application expression `F(M)` is syntactically incomplete: either the opening `(` is missing after the functor name, or the argument list is not closed with `)`. Check that every module argument is wrapped in matching parentheses."
since = "0.1.0"
deprecated = false

[diagnostic.P0191]
severity = "error"
category = "parser"
title = "Malformed sharing constraint"
brief = "malformed sharing constraint: expected `=` between paths"
description = "A sharing constraint in a functor application `sharing (A::t = B::t)` is malformed: the `=` separator between the two module paths is missing or the paths themselves are incomplete."
since = "0.1.0"
deprecated = false

[diagnostic.P0192]
severity = "error"
category = "parser"
title = "Malformed pack expression"
brief = "malformed pack expression: expected `:` or signature"
description = "A pack expression `pack M : S` is syntactically incomplete: either the `:` separator is missing or the signature path is absent. Check that the pack syntax is `pack <module> : <signature>`."
since = "0.1.0"
deprecated = false

[diagnostic.P0193]
severity = "error"
category = "parser"
title = "Malformed unpack expression"
brief = "malformed unpack expression: missing operand"
description = "An unpack expression `unpack v` is missing its operand. Provide an expression that evaluates to a packed module value."
since = "0.1.0"
deprecated = false

[diagnostic.P0194]
severity = "error"
category = "parser"
title = "Malformed let-module binding"
brief = "malformed let-module binding: missing `=`, `unpack`, or `in`"
description = "A let-module binding `let module N = unpack v in <expr>` is syntactically incomplete: either `=` after the binding name, the `unpack` keyword, or `in` before the continuation is missing. Check the syntax: `let module <name> = unpack <value> in <expr>`."
since = "0.1.0"
deprecated = false

[diagnostic.O1500]
severity = "note"
category = "optimization"
title = "Peephole rewrite applied"
brief = "a peephole rewrite fired on the function"
description = "Per optimization-passes.md §1.2, peephole rewrites improve generated code quality. O1500 informs the user when a rewrite fired."
since = "0.1.0"
deprecated = false

[diagnostic.O1503]
severity = "note"
category = "optimization"
title = "Instruction scheduling applied"
brief = "instruction scheduling reordered independent instructions to hide latency"
description = "Per optimization-passes.md §2, instruction scheduling exploits ILP within basic blocks by hoisting higher-latency operations earlier."
since = "0.1.0"
deprecated = false

[diagnostic.O1504]
severity = "note"
category = "optimization"
title = "Macro-fusion alignment applied"
brief = "CMP+Jcc pair aligned within a 16-byte fetch window for macro fusion"
description = "Per optimization-passes.md §4, modern x86_64 CPUs fuse CMP+Jcc (or TEST+Jcc) pairs into a single µop, but only when both fit within one 16-byte fetch window. This pass aligns such pairs by inserting NOPs as needed."
since = "0.1.0"
deprecated = false

[diagnostic.O1505]
severity = "note"
category = "optimization"
title = "Dead-store elimination applied"
brief = "stores to memory subsequently overwritten without intervening reads were removed"
description = "Per optimization-passes.md §5, basic-block-local dead-store elimination removes stores whose effects are immediately overwritten."
since = "0.1.0"
deprecated = false

[diagnostic.O1506]
severity = "note"
category = "optimization"
title = "REX/EVEX prefix tightening applied"
brief = "instruction shortened to its smallest legal encoding"
description = "Per optimization-passes.md §6, picking the shortest legal encoding (32-bit ADD short form, Jcc rel8 over rel32) reduces code size and improves L1i density."
since = "0.1.0"
deprecated = false

[diagnostic.Q0901]
severity = "error"
category = "post-quantum"
title = "Signing-key scope insufficient"
brief = "the signing key's scope does not subsume the artifact's effect set"
description = "Per OS-requirements §4 N1, a signing key is authorized for a specific set of effects (its scope). When signing a PAX, the PAX's effect set (from .paideia.effects section) must be a subset of the key's authorized scope. This error indicates a scope mismatch: the key cannot sign this artifact because it lacks authorization for some required effects. Check the key's scope and the artifact's effect declarations."
since = "0.1.0"
deprecated = false
